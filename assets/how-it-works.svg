<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="700" height="260" rx="12" fill="url(#bg2)"/>

  <!-- Without digin -->
  <text x="30" y="35" font-family="monospace" font-size="13" fill="#e94560" font-weight="bold">WITHOUT digin:</text>
  <rect x="20" y="48" width="310" height="80" rx="8" fill="#0f3460" opacity="0.4"/>
  <text x="35" y="72" font-family="monospace" font-size="13" fill="#888">data</text>
  <text x="75" y="72" font-family="monospace" font-size="13" fill="#e8e8e8">["users"]["alice"]["address"]["city"]</text>
  <text x="35" y="96" font-family="monospace" font-size="13" fill="#888">data</text>
  <text x="75" y="96" font-family="monospace" font-size="13" fill="#e8e8e8">["users"]["alice"]["scores"][0]</text>
  <text x="35" y="120" font-family="monospace" font-size="13" fill="#888">data</text>
  <text x="75" y="120" font-family="monospace" font-size="13" fill="#e8e8e8">["config"]["db"]["host"]</text>

  <!-- Arrow -->
  <text x="345" y="95" font-family="monospace" font-size="28" fill="#e94560">→</text>

  <!-- With digin -->
  <text x="385" y="35" font-family="monospace" font-size="13" fill="#4ecca3" font-weight="bold">WITH digin:</text>
  <rect x="375" y="48" width="310" height="80" rx="8" fill="#0f3460" opacity="0.4"/>
  <text x="390" y="72" font-family="monospace" font-size="13" fill="#888">nd</text>
  <text x="415" y="72" font-family="monospace" font-size="13" fill="#4ecca3">("users.alice.address.city")</text>
  <text x="390" y="96" font-family="monospace" font-size="13" fill="#888">nd</text>
  <text x="415" y="96" font-family="monospace" font-size="13" fill="#4ecca3">("users.alice.scores.0")</text>
  <text x="390" y="120" font-family="monospace" font-size="13" fill="#888">nd</text>
  <text x="415" y="120" font-family="monospace" font-size="13" fill="#4ecca3">.config.db.host</text>

  <!-- Features row -->
  <rect x="20" y="150" width="155" height="90" rx="8" fill="#0f3460" opacity="0.3"/>
  <text x="40" y="176" font-family="monospace" font-size="12" fill="#e94560" font-weight="bold">4 access methods</text>
  <text x="40" y="196" font-family="monospace" font-size="11" fill="#888">.get()  ["key"]</text>
  <text x="40" y="214" font-family="monospace" font-size="11" fill="#888">.attr   ("key")</text>

  <rect x="190" y="150" width="155" height="90" rx="8" fill="#0f3460" opacity="0.3"/>
  <text x="210" y="176" font-family="monospace" font-size="12" fill="#e94560" font-weight="bold">3 data types</text>
  <text x="210" y="196" font-family="monospace" font-size="11" fill="#888">NestedDict</text>
  <text x="210" y="214" font-family="monospace" font-size="11" fill="#888">NestedList / Tuple</text>

  <rect x="360" y="150" width="155" height="90" rx="8" fill="#0f3460" opacity="0.3"/>
  <text x="380" y="176" font-family="monospace" font-size="12" fill="#e94560" font-weight="bold">custom delimiter</text>
  <text x="380" y="196" font-family="monospace" font-size="11" fill="#888">"->"  "."  "/"</text>
  <text x="380" y="214" font-family="monospace" font-size="11" fill="#888">"::"  or anything</text>

  <rect x="530" y="150" width="155" height="90" rx="8" fill="#0f3460" opacity="0.3"/>
  <text x="550" y="176" font-family="monospace" font-size="12" fill="#e94560" font-weight="bold">safe defaults</text>
  <text x="550" y="196" font-family="monospace" font-size="11" fill="#888">nd.get("x", default=0)</text>
  <text x="550" y="214" font-family="monospace" font-size="11" fill="#888">no KeyError panic</text>
</svg>
